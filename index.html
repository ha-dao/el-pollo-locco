    <link rel="stylesheet" href="./style.css">
    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>

    <script src="./models/chicken.class.js"></script>
    <script src="./models/chicken-small.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/status-bar-coin.class.js"></script>
    <script src="./models/status-bar-bottle.class.js"></script>
    <script src="./models/status-bar-endboss.class.js"></script>
    <script src="./models/coin.class.js"></script>
    <script src="./models/bottle.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/world.class.js"></script>

</head>
<body>
    <h1>El Pollo Locco</h1>
    <section class="game-content">
    <canvas width="720" height="480" id="canvas"></canvas>
    <button id="start-game-btn" onclick="initLevel1(), init(), removeStartGameBtn()">Start Game</button>
    </section>

    <section>
        <button class="instruction-info-button" id="instruction-info" onclick="getInstruction()">?</button>
    </section>

    <section class="instruction-template d-none" id="instruction-template" style="font-family: Arial, sans-serif;">
        <h3>Instruction</h3>
        <p>Arrow Left or 'A' Key - move to left</P>
        <p>Arrow Right or 'D' Key - move to right</P>
        <p>'Spacebar' Key - jump up</P>
        <p>'F' Key - throw tabasco bottle</P>
    </section>
</body>
